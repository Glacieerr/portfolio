<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>叶璨源 · 作品集 | 程序·设计·摄影</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fafaf9;
            color: #1c1c1e;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* 头部导航 */
        header {
            padding: 2rem 0 1rem;
            border-bottom: 1px solid #e4e4e7;
            margin-bottom: 2rem;
        }

        .name {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .tagline {
            color: #555;
            margin-top: 0.25rem;
            font-size: 1rem;
        }

        /* 分类筛选按钮 */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 2rem 0 2rem;
            justify-content: center;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
        }

        .filter-btn.active {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }

        .filter-btn:hover {
            background: #e2e8f0;
        }

        /* 作品网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0 3rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.25s ease, box-shadow 0.25s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            background: #f0f0f0;
            display: block;
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-category {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #1e40af;
            margin-bottom: 0.6rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-link {
            font-size: 0.8rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        /* 轻提示弹窗（图片放大） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .modal img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* 关于 & 联系 */
        .about-section, .contact-section {
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid #e4e4e7;
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .contact-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .contact-links a {
            color: #1e293b;
            text-decoration: none;
            border-bottom: 1px dashed #94a3b8;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.8rem;
            color: #6c757d;
            border-top: 1px solid #e4e4e7;
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="name">叶璨源 · YE CANYUAN</div>
        <div class="tagline">程序员 / 设计师 / 摄影与画手</div>
    </header>

    <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-category="all">全部作品</button>
        <button class="filter-btn" data-category="code">💻 编程项目</button>
        <button class="filter-btn" data-category="design">🎨 设计作品</button>
        <button class="filter-btn" data-category="photo">📷 摄影</button>
        <button class="filter-btn" data-category="art">🖌️ 画作</button>
    </div>

    <div class="gallery" id="galleryContainer"></div>

    <div class="about-section" id="about">
        <h2>关于我</h2>
        <p>我是叶璨源，全栈开发者 + 视觉创作者。我相信代码与美学同源。这里融合了我的编程实验、UI/平面设计、街头摄影以及手绘作品。每一件都是我探索世界的切面。</p>
        <p>📍 目前 base 纽约 · 自由职业 · 接受项目合作</p>
    </div>

    <div class="contact-section" id="contact">
        <h2>联系</h2>
        <div class="contact-links">
            <a href="mailto:fjyecy@gmail.com">📧 fjyecy@gmail.com</a>
            <a href="#">GitHub</a>
            <a href="#">Behance</a>
            <a href="#">Instagram</a>
        </div>
    </div>
    <footer>
        © 2026 叶璨源 · 作品集永久属于我自己 · 代码与热爱
    </footer>
</div>

<!-- 图片放大弹窗 -->
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="" alt="放大预览">
</div>

<script>
    // ---------- 作品数据 (你需要替换为自己的内容) ----------
    const works = [
        // 编程项目
        {
            title: "VitePress 博客主题",
            category: "code",
            img: "images/code-blog.png",   // 替换成你自己的图片路径
            desc: "极简个人博客主题，支持暗色模式与标签系统。Vue3 + Vite 构建。",
            link: "https://github.com/yourname/blog-theme",
            linkText: "GitHub →"
        },
        {
            title: "任务管理 CLI 工具",
            category: "code",
            img: "images/code-cli.png",
            desc: "Rust 编写的命令行待办工具，支持数据持久化。",
            link: "https://github.com/yourname/todo-cli",
            linkText: "查看源码"
        },
        // 设计作品
        {
            title: "品牌 VI 设计 - 山野茶室",
            category: "design",
            img: "images/design-branding.jpg",
            desc: "Logo、包装、菜单版式系统，东方极简风格。",
            link: "#",
            linkText: "查看全案"
        },
        {
            title: "移动端天气 App 界面",
            category: "design",
            img: "images/design-weather.jpg",
            desc: "高保真原型，深色模式动效演示。",
            link: "#",
            linkText: "Figma 社区"
        },
        // 摄影
        {
            title: "弄堂光影",
            category: "photo",
            img: "images/photo-alley.jpg",
            desc: "上海老弄堂，Leica M10 黑白胶片模拟。",
            link: "#",
            linkText: "更多"
        },
        {
            title: "冰岛·极光",
            category: "photo",
            img: "images/photo-aurora.jpg",
            desc: "长曝光作品，2025 年冬。",
            link: "#",
            linkText: "原图故事"
        },
        // 画作
        {
            title: "数字绘画 · 赛博朋克 2077",
            category: "art",
            img: "images/art-cyber.jpg",
            desc: "Procreate 绘制，耗时 20h。",
            link: "#",
            linkText: "绘画过程"
        },
        {
            title: "水彩 · 江南古镇",
            category: "art",
            img: "images/art-watercolor.jpg",
            desc: "纸本水彩，2024 年个人收藏。",
            link: "#",
            linkText: "原作可售"
        }
    ];

    // 渲染函数
    function renderGallery(category) {
        const container = document.getElementById('galleryContainer');
        const filtered = category === 'all' ? works : works.filter(w => w.category === category);
        
        if (filtered.length === 0) {
            container.innerHTML = `<p style="grid-column:1/-1; text-align:center;">暂无此类作品，稍后添加 ✨</p>`;
            return;
        }

        let html = '';
        for (let work of filtered) {
            // 分类中文显示
            let catChinese = '';
            if (work.category === 'code') catChinese = '编程项目';
            else if (work.category === 'design') catChinese = '设计';
            else if (work.category === 'photo') catChinese = '摄影';
            else if (work.category === 'art') catChinese = '画作';
            
            html += `
                <div class="card" data-category="${work.category}">
                    <img class="card-img" src="${work.img}" alt="${work.title}" loading="lazy" onclick="openModal(this.src)">
                    <div class="card-content">
                        <div class="card-category">${catChinese}</div>
                        <div class="card-title">${work.title}</div>
                        <div class="card-desc">${work.desc}</div>
                        ${work.link !== '#' ? `<a href="${work.link}" target="_blank" class="card-link" onclick="event.stopPropagation()">${work.linkText || '访问链接'} →</a>` : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // 图片放大弹窗
    function openModal(src) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = src;
    }
    window.openModal = openModal;

    // 关闭弹窗
    document.querySelector('.modal-close').onclick = () => {
        document.getElementById('imageModal').style.display = 'none';
    };
    document.getElementById('imageModal').onclick = (e) => {
        if (e.target === document.getElementById('imageModal')) {
            document.getElementById('imageModal').style.display = 'none';
        }
    };

    // 筛选按钮交互
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const category = btn.getAttribute('data-category');
            renderGallery(category);
        });
    });

    // 初始渲染全部
    renderGallery('all');
</script>
</body>
</html>
